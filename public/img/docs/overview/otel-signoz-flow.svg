<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" role="img" aria-labelledby="otel-signoz-flow-title otel-signoz-flow-desc">
  <title id="otel-signoz-flow-title">OpenTelemetry to SigNoz data flow</title>
  <desc id="otel-signoz-flow-desc">Your application, instrumented with OpenTelemetry, sends telemetry data via OTLP to SigNoz, where it is stored and turned into dashboards, alerts, and search.</desc>
  <defs>
    <marker id="otel-signoz-arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4B5563"/>
    </marker>
  </defs>

  <!-- Your App (instrumented with OpenTelemetry) -->
  <rect x="40" y="50" width="260" height="140" rx="14" fill="#E3F5EC" stroke="#2E8B57" stroke-width="2"/>
  <text x="170" y="100" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="22" font-weight="700" fill="#1F2937">Your App</text>
  <text x="170" y="134" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="14" fill="#374151">with OpenTelemetry SDK</text>
  <text x="170" y="154" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="14" fill="#374151">or auto-instrumentation</text>

  <!-- Arrow and OTLP label -->
  <text x="380" y="110" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="600" fill="#4B5563">OTLP</text>
  <line x1="310" y1="120" x2="450" y2="120" stroke="#4B5563" stroke-width="2.5" marker-end="url(#otel-signoz-arrow)"/>

  <!-- SigNoz -->
  <rect x="460" y="50" width="260" height="140" rx="14" fill="#FFE9D6" stroke="#E06C20" stroke-width="2"/>
  <text x="590" y="100" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="22" font-weight="700" fill="#1F2937">SigNoz</text>
  <text x="590" y="134" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="14" fill="#374151">dashboards · alerts</text>
  <text x="590" y="154" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="14" fill="#374151">search · visualization</text>
</svg>
