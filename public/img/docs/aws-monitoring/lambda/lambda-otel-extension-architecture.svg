<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" width="780" height="320" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#6366f1"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="320" fill="#0f172a" rx="12"/>

  <!-- Lambda function outer box -->
  <rect x="20" y="20" width="580" height="280" rx="10" fill="#1e293b" stroke="#D86613" stroke-width="1.5"/>
  <text x="36" y="44" font-size="11" fill="#FF9900" letter-spacing="0.5">AWS Lambda Function</text>

  <!-- OTel Collector Extension Layer inner box -->
  <rect x="40" y="56" width="540" height="228" rx="8" fill="#0f172a" stroke="#3730a3" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="56" y="77" font-size="11" fill="#818cf8" letter-spacing="0.5">Extension Layer — OpenTelemetry Collector</text>

  <!-- Component boxes -->
  <!-- telemetryapi receiver -->
  <rect x="60" y="90" width="170" height="52" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="145" y="111" font-size="11" fill="#c7d2fe" text-anchor="middle" font-weight="600">telemetryapi</text>
  <text x="145" y="128" font-size="10" fill="#64748b" text-anchor="middle">receiver</text>

  <!-- batch processor -->
  <rect x="265" y="90" width="140" height="52" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="335" y="111" font-size="11" fill="#c7d2fe" text-anchor="middle" font-weight="600">batch</text>
  <text x="335" y="128" font-size="10" fill="#64748b" text-anchor="middle">processor</text>

  <!-- decouple processor -->
  <rect x="265" y="182" width="140" height="52" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="335" y="203" font-size="11" fill="#c7d2fe" text-anchor="middle" font-weight="600">decouple</text>
  <text x="335" y="220" font-size="10" fill="#64748b" text-anchor="middle">processor</text>

  <!-- otlp_grpc exporter -->
  <rect x="450" y="136" width="110" height="52" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="505" y="157" font-size="11" fill="#c7d2fe" text-anchor="middle" font-weight="600">otlp_grpc</text>
  <text x="505" y="174" font-size="10" fill="#64748b" text-anchor="middle">exporter</text>

  <!-- Arrows between components -->
  <!-- telemetryapi → batch -->
  <line x1="230" y1="116" x2="263" y2="116" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- batch → decouple (down then left side) -->
  <line x1="335" y1="142" x2="335" y2="180" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- decouple → otlp_grpc (right then up) -->
  <polyline points="405,208 430,208 430,162 448,162" fill="none" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Lambda Telemetry API (left, outside lambda box) - label vertical -->
  <text x="-116" y="14" font-size="10" fill="#94a3b8" text-anchor="middle" transform="rotate(-90)">Lambda Telemetry API</text>

  <!-- Arrow from left edge into telemetryapi receiver -->
  <line x1="20" y1="116" x2="58" y2="116" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-gray)"/>

  <!-- SigNoz box (right, outside lambda) -->
  <rect x="628" y="136" width="128" height="52" rx="8" fill="#f25733" stroke="#ef1307ff" stroke-width="1.5"/>
  <text x="692" y="158" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="700">SigNoz</text>
  <text x="692" y="175" font-size="10" fill="#ffedd5" text-anchor="middle">Cloud / Self-Hosted</text>

  <!-- Arrow from otlp_grpc exporter → SigNoz -->
  <line x1="560" y1="162" x2="626" y2="162" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Annotation: decouple processor note -->
  <text x="60" y="258" font-size="10" fill="#475569">
    <tspan>decouple: buffers telemetry — export runs outside the function's execution path</tspan>
  </text>
</svg>
