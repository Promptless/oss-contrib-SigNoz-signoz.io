<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 120" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="780" height="120" fill="#0f172a" rx="10"/>
  <!-- Lambda Function -->
  <rect x="16" y="30" width="130" height="60" rx="8" fill="#1e293b" stroke="#FF9900" stroke-width="1.5"/>
  <text x="81" y="55" font-size="11" fill="#FF9900" text-anchor="middle" font-weight="600">Lambda</text>
  <text x="81" y="72" font-size="10" fill="#94a3b8" text-anchor="middle">Function</text>
  <!-- Arrow: Lambda → OTel Layer -->
  <line x1="146" y1="60" x2="218" y2="60" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="182" y="52" font-size="9" fill="#818cf8" text-anchor="middle">Traces</text>
  <!-- OTel Language Layer -->
  <rect x="220" y="30" width="160" height="60" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="300" y="54" font-size="11" fill="#c7d2fe" text-anchor="middle" font-weight="600">OTel Language</text>
  <text x="300" y="71" font-size="10" fill="#64748b" text-anchor="middle">Layer</text>
  <!-- Arrow: OTel Layer → OTel Collector -->
  <line x1="380" y1="60" x2="448" y2="60" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="414" y="52" font-size="9" fill="#818cf8" text-anchor="middle">OTLP</text>
  <!-- OTel Collector Extension Layer -->
  <rect x="450" y="30" width="150" height="60" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="525" y="54" font-size="11" fill="#c7d2fe" text-anchor="middle" font-weight="600">OTel Collector</text>
  <text x="525" y="71" font-size="10" fill="#64748b" text-anchor="middle">Extension Layer</text>
  <!-- Arrow: OTel Collector → SigNoz -->
  <line x1="600" y1="60" x2="648" y2="60" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="624" y="52" font-size="9" fill="#818cf8" text-anchor="middle">OTLP</text>
  <!-- SigNoz -->
  <rect x="650" y="30" width="114" height="60" rx="8" fill="#f25733" stroke="#ef1307ff" stroke-width="1.5"/>
  <text x="707" y="54" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="700">SigNoz</text>
  <text x="707" y="71" font-size="10" fill="#ffedd5" text-anchor="middle">Traces</text>
</svg>
