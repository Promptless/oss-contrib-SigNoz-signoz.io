<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 120" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#6366f1"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="780" height="120" fill="#0f172a" rx="10"/>
  <!-- Lambda Logs -->
  <rect x="16" y="30" width="110" height="60" rx="8" fill="#1e293b" stroke="#FF9900" stroke-width="1.5"/>
  <text x="71" y="55" font-size="11" fill="#FF9900" text-anchor="middle" font-weight="600">Lambda</text>
  <text x="71" y="72" font-size="10" fill="#94a3b8" text-anchor="middle">Logs</text>
  <!-- Arrow: Lambda → S3 -->
  <line x1="126" y1="60" x2="198" y2="60" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="162" y="52" font-size="9" fill="#94a3b8" text-anchor="middle">CloudWatch</text>
  <!-- S3 Bucket -->
  <rect x="200" y="30" width="90" height="60" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="245" y="55" font-size="11" fill="#c7d2fe" text-anchor="middle" font-weight="600">S3</text>
  <text x="245" y="72" font-size="10" fill="#64748b" text-anchor="middle">Bucket</text>
  <!-- Arrow: S3 → Lambda Forwarder -->
  <line x1="290" y1="60" x2="378" y2="60" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="334" y="52" font-size="9" fill="#94a3b8" text-anchor="middle">S3 Trigger</text>
  <!-- Lambda Forwarder -->
  <rect x="380" y="30" width="130" height="60" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="445" y="55" font-size="11" fill="#c7d2fe" text-anchor="middle" font-weight="600">Lambda</text>
  <text x="445" y="72" font-size="10" fill="#64748b" text-anchor="middle">Forwarder</text>
  <!-- Arrow: Forwarder → SigNoz -->
  <line x1="510" y1="60" x2="568" y2="60" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="539" y="52" font-size="9" fill="#818cf8" text-anchor="middle">HTTP</text>
  <!-- SigNoz -->
  <rect x="570" y="30" width="194" height="60" rx="8" fill="#f25733" stroke="#ef1307ff" stroke-width="1.5"/>
  <text x="667" y="54" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="700">SigNoz</text>
  <text x="667" y="71" font-size="10" fill="#ffedd5" text-anchor="middle">Cloud / Self-Hosted</text>
</svg>
