<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="'Inter', 'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="geoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00b894"/>
      <stop offset="100%" stop-color="#00816b"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4a6a"/>
      <stop offset="100%" stop-color="#2d2d4a"/>
    </linearGradient>
    <linearGradient id="dbTopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6a6a9a"/>
      <stop offset="100%" stop-color="#4a4a6a"/>
    </linearGradient>
    <linearGradient id="beforeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e2a4a"/>
      <stop offset="100%" stop-color="#111828"/>
    </linearGradient>
    <linearGradient id="afterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d2620"/>
      <stop offset="100%" stop-color="#091a15"/>
    </linearGradient>

    <filter id="glowGreen" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#00b894" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#74b9ff" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowYellow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ffeaa7" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <circle id="dotBlue"   r="5" fill="#74b9ff" filter="url(#glowBlue)"/>
    <circle id="dotGreen"  r="5" fill="#55efc4" filter="url(#glowGreen)"/>
    <circle id="dotYellow" r="5" fill="#ffeaa7" filter="url(#glowYellow)"/>

    <pattern id="collectorPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="rgba(255,255,255,0.03)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1100" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" fill="#f5f6fa" font-size="17" font-weight="700" letter-spacing="0.5">GeoIP Processor — IP Address to Geographic Attribute Enrichment</text>

  <!-- Collector boundary -->
  <rect x="290" y="58" width="520" height="400" rx="16" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" stroke-dasharray="8 4"/>
  <rect x="290" y="58" width="520" height="400" rx="16" fill="url(#collectorPattern)"/>
  <text x="550" y="80" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="11" font-weight="600" letter-spacing="1.5">OPENTELEMETRY COLLECTOR</text>

  <!-- ===== LEFT: BEFORE CARD ===== -->
  <g filter="url(#shadow)">
    <rect x="18" y="88" width="242" height="298" rx="12" fill="url(#beforeGrad)" stroke="rgba(116,185,255,0.2)" stroke-width="1"/>
    <text x="139" y="114" text-anchor="middle" fill="#74b9ff" font-size="11" font-weight="700" letter-spacing="1">INCOMING RECORD</text>
    <line x1="34" y1="122" x2="244" y2="122" stroke="rgba(116,185,255,0.12)" stroke-width="1"/>

    <!-- Highlighted IP attribute -->
    <rect x="30" y="130" width="218" height="38" rx="7" fill="rgba(116,185,255,0.1)" stroke="rgba(116,185,255,0.35)" stroke-width="1"/>
    <text x="42" y="147" fill="rgba(116,185,255,0.75)" font-size="9" font-weight="600">client.address</text>
    <text x="42" y="161" fill="#74b9ff" font-size="11" font-weight="700">203.0.113.42</text>

    <text x="42" y="190" fill="rgba(255,255,255,0.35)" font-size="9">service.name</text>
    <text x="244" y="190" text-anchor="end" fill="rgba(255,255,255,0.55)" font-size="9">checkout</text>
    <line x1="30" y1="197" x2="250" y2="197" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <text x="42" y="216" fill="rgba(255,255,255,0.35)" font-size="9">http.method</text>
    <text x="244" y="216" text-anchor="end" fill="rgba(255,255,255,0.55)" font-size="9">POST</text>
    <line x1="30" y1="223" x2="250" y2="223" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <text x="42" y="242" fill="rgba(255,255,255,0.35)" font-size="9">http.status_code</text>
    <text x="244" y="242" text-anchor="end" fill="rgba(255,255,255,0.55)" font-size="9">200</text>
    <line x1="30" y1="249" x2="250" y2="249" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <text x="42" y="268" fill="rgba(255,255,255,0.35)" font-size="9">span.kind</text>
    <text x="244" y="268" text-anchor="end" fill="rgba(255,255,255,0.55)" font-size="9">SERVER</text>
    <line x1="30" y1="275" x2="250" y2="275" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <text x="139" y="360" text-anchor="middle" fill="rgba(116,185,255,0.25)" font-size="9" font-style="italic">no geo.* attributes</text>
  </g>

  <!-- ===== CENTER: GEOIP PROCESSOR ===== -->
  <g filter="url(#shadow)">
    <rect x="368" y="95" width="196" height="158" rx="12" fill="url(#geoGrad)"/>
    <text x="466" y="122" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">GeoIP Processor</text>
    <line x1="388" y1="134" x2="544" y2="134" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="466" y="158" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">reads: client.address</text>
    <text x="466" y="176" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">reads: source.address</text>
    <text x="466" y="198" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9" font-style="italic">context: resource</text>
    <text x="466" y="243" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="8" font-style="italic">first valid IP wins</text>
  </g>
  <!-- Processor pulse -->
  <rect x="368" y="95" width="196" height="158" rx="12" fill="none" stroke="#55efc4" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.15;0.6;0.15" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- ===== CENTER: MAXMIND DATABASE (cylinder) ===== -->
  <g filter="url(#shadow)">
    <!-- cylinder body -->
    <rect x="378" y="328" width="176" height="102" rx="4" fill="url(#dbGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <!-- cylinder top ellipse -->
    <ellipse cx="466" cy="328" rx="88" ry="13" fill="url(#dbTopGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <!-- cylinder bottom ellipse -->
    <ellipse cx="466" cy="430" rx="88" ry="13" fill="#2a2a48" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

    <text x="466" y="364" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11" font-weight="700">MaxMind Database</text>
    <text x="466" y="383" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">GeoLite2-City.mmdb</text>
    <text x="466" y="401" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="8" font-style="italic">loaded at startup</text>
  </g>
  <!-- DB pulse -->
  <ellipse cx="466" cy="328" rx="88" ry="13" fill="none" stroke="#a29bfe" stroke-width="1">
    <animate attributeName="stroke-opacity" values="0.1;0.4;0.1" dur="4s" repeatCount="indefinite" begin="1s"/>
  </ellipse>

  <!-- ===== RIGHT: AFTER CARD ===== -->
  <g filter="url(#shadow)">
    <rect x="840" y="72" width="244" height="368" rx="12" fill="url(#afterGrad)" stroke="rgba(0,184,148,0.22)" stroke-width="1"/>
    <text x="962" y="98" text-anchor="middle" fill="#55efc4" font-size="11" font-weight="700" letter-spacing="1">ENRICHED RECORD</text>
    <line x1="856" y1="106" x2="1068" y2="106" stroke="rgba(0,184,148,0.12)" stroke-width="1"/>

    <!-- Original IP, preserved -->
    <text x="858" y="125" fill="rgba(116,185,255,0.6)" font-size="9">client.address</text>
    <text x="1068" y="125" text-anchor="end" fill="rgba(116,185,255,0.6)" font-size="9">203.0.113.42</text>
    <line x1="852" y1="132" x2="1072" y2="132" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

    <!-- Geo attributes block -->
    <rect x="852" y="138" width="220" height="278" rx="7" fill="rgba(0,184,148,0.06)" stroke="rgba(0,184,148,0.18)" stroke-width="1"/>
    <text x="862" y="157" fill="rgba(0,184,148,0.6)" font-size="8" font-weight="600" letter-spacing="0.8">GEO ATTRIBUTES ADDED</text>

    <text x="862" y="178" fill="rgba(255,255,255,0.45)" font-size="9">geo.city_name</text>
    <text x="1062" y="178" text-anchor="end" fill="#55efc4" font-size="9">San Francisco</text>
    <line x1="858" y1="185" x2="1062" y2="185" stroke="rgba(0,184,148,0.09)" stroke-width="1"/>

    <text x="862" y="203" fill="rgba(255,255,255,0.45)" font-size="9">geo.country_name</text>
    <text x="1062" y="203" text-anchor="end" fill="#55efc4" font-size="9">United States</text>
    <line x1="858" y1="210" x2="1062" y2="210" stroke="rgba(0,184,148,0.09)" stroke-width="1"/>

    <text x="862" y="228" fill="rgba(255,255,255,0.45)" font-size="9">geo.country.iso_code</text>
    <text x="1062" y="228" text-anchor="end" fill="#55efc4" font-size="9">US</text>
    <line x1="858" y1="235" x2="1062" y2="235" stroke="rgba(0,184,148,0.09)" stroke-width="1"/>

    <text x="862" y="253" fill="rgba(255,255,255,0.45)" font-size="9">geo.region_name</text>
    <text x="1062" y="253" text-anchor="end" fill="#55efc4" font-size="9">California</text>
    <line x1="858" y1="260" x2="1062" y2="260" stroke="rgba(0,184,148,0.09)" stroke-width="1"/>

    <text x="862" y="278" fill="rgba(255,255,255,0.45)" font-size="9">geo.region.iso_code</text>
    <text x="1062" y="278" text-anchor="end" fill="#55efc4" font-size="9">US-CA</text>
    <line x1="858" y1="285" x2="1062" y2="285" stroke="rgba(0,184,148,0.09)" stroke-width="1"/>

    <text x="862" y="303" fill="rgba(255,255,255,0.45)" font-size="9">geo.timezone</text>
    <text x="1062" y="303" text-anchor="end" fill="#55efc4" font-size="9">America/Los_Angeles</text>
    <line x1="858" y1="310" x2="1062" y2="310" stroke="rgba(0,184,148,0.09)" stroke-width="1"/>

    <text x="862" y="328" fill="rgba(255,255,255,0.45)" font-size="9">geo.postal_code</text>
    <text x="1062" y="328" text-anchor="end" fill="#55efc4" font-size="9">94107</text>
    <line x1="858" y1="335" x2="1062" y2="335" stroke="rgba(0,184,148,0.09)" stroke-width="1"/>

    <text x="862" y="353" fill="rgba(255,255,255,0.45)" font-size="9">geo.location.lat</text>
    <text x="1062" y="353" text-anchor="end" fill="#55efc4" font-size="9">37.7749</text>
    <line x1="858" y1="360" x2="1062" y2="360" stroke="rgba(0,184,148,0.09)" stroke-width="1"/>

    <text x="862" y="378" fill="rgba(255,255,255,0.45)" font-size="9">geo.location.lon</text>
    <text x="1062" y="378" text-anchor="end" fill="#55efc4" font-size="9">-122.4194</text>
    <line x1="858" y1="385" x2="1062" y2="385" stroke="rgba(0,184,148,0.09)" stroke-width="1"/>

    <text x="862" y="403" fill="rgba(255,255,255,0.45)" font-size="9">geo.continent.code</text>
    <text x="1062" y="403" text-anchor="end" fill="#55efc4" font-size="9">NA</text>
  </g>

  <!-- ===== CONNECTION PATHS ===== -->
  <!-- Left card → GeoIP Processor -->
  <path id="pathIn"   d="M260,237 L368,174" fill="none" stroke="rgba(116,185,255,0.22)" stroke-width="2"/>
  <!-- GeoIP Processor → MaxMind DB (lookup) -->
  <path id="pathDown" d="M455,253 L455,315" fill="none" stroke="rgba(255,234,167,0.3)" stroke-width="2" stroke-dasharray="5 3"/>
  <!-- MaxMind DB → GeoIP Processor (response) -->
  <path id="pathUp"   d="M477,315 L477,253" fill="none" stroke="rgba(0,184,148,0.3)" stroke-width="2" stroke-dasharray="5 3"/>
  <!-- GeoIP Processor → Right card (enriched) -->
  <path id="pathOut"  d="M564,174 L840,237" fill="none" stroke="rgba(0,184,148,0.22)" stroke-width="2"/>

  <!-- Direction labels on vertical lookup -->
  <text x="422" y="288" fill="rgba(255,234,167,0.55)" font-size="8" text-anchor="middle" font-style="italic">lookup</text>
  <text x="505" y="288" fill="rgba(0,184,148,0.55)" font-size="8" text-anchor="middle" font-style="italic">geo data</text>

  <!-- ===== ANIMATED DOTS ===== -->
  <!-- Incoming: left → processor (blue) -->
  <use href="#dotBlue">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="3.2s" repeatCount="indefinite"/>
    <animateMotion dur="3.2s" repeatCount="indefinite"><mpath href="#pathIn"/></animateMotion>
  </use>
  <use href="#dotBlue">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="3.2s" repeatCount="indefinite" begin="1.6s"/>
    <animateMotion dur="3.2s" repeatCount="indefinite" begin="1.6s"><mpath href="#pathIn"/></animateMotion>
  </use>

  <!-- Lookup: processor → db (yellow) -->
  <use href="#dotYellow">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="1.4s" repeatCount="indefinite" begin="0.9s"/>
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="0.9s"><mpath href="#pathDown"/></animateMotion>
  </use>
  <use href="#dotYellow">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="1.4s" repeatCount="indefinite" begin="2.5s"/>
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="2.5s"><mpath href="#pathDown"/></animateMotion>
  </use>

  <!-- Response: db → processor (green) -->
  <use href="#dotGreen">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="1.4s" repeatCount="indefinite" begin="1.4s"/>
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="1.4s"><mpath href="#pathUp"/></animateMotion>
  </use>
  <use href="#dotGreen">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="1.4s" repeatCount="indefinite" begin="3s"/>
    <animateMotion dur="1.4s" repeatCount="indefinite" begin="3s"><mpath href="#pathUp"/></animateMotion>
  </use>

  <!-- Enriched: processor → right card (green) -->
  <use href="#dotGreen">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="3.2s" repeatCount="indefinite" begin="1.8s"/>
    <animateMotion dur="3.2s" repeatCount="indefinite" begin="1.8s"><mpath href="#pathOut"/></animateMotion>
  </use>
  <use href="#dotGreen">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="3.2s" repeatCount="indefinite" begin="3.4s"/>
    <animateMotion dur="3.2s" repeatCount="indefinite" begin="3.4s"><mpath href="#pathOut"/></animateMotion>
  </use>

  <!-- ===== LEGEND ===== -->
  <rect x="18" y="462" width="390" height="38" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <circle cx="42"  cy="481" r="5" fill="#74b9ff"/>
  <text x="55"  y="485" fill="rgba(255,255,255,0.65)" font-size="10">incoming record</text>
  <circle cx="163" cy="481" r="5" fill="#ffeaa7"/>
  <text x="176" y="485" fill="rgba(255,255,255,0.65)" font-size="10">db lookup</text>
  <circle cx="260" cy="481" r="5" fill="#55efc4"/>
  <text x="273" y="485" fill="rgba(255,255,255,0.65)" font-size="10">geo data / enriched</text>
</svg>
