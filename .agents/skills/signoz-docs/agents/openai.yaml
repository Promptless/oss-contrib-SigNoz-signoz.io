interface:
  display_name: "SigNoz Docs Search"
  short_description: "Fetch ranked SigNoz docs and API reference links"
  default_prompt: "Use $signoz-docs and run `python3 scripts/find_signoz_docs.py --query \"<user question>\" --k 8 --format markdown --refresh auto` from the signoz-docs skill directory before drafting your answer. Always cite returned URLs. If the command output includes warnings about refresh/fetch failures, retry once with `--refresh force`; if warnings persist, run once with `--refresh off` and disclose stale-data risk. If results are empty or top confidence is 0.00, treat it as no-match, avoid fabrication, return up to 3 closest official links, and ask one focused follow-up question. If top confidence is below 0.60, return the top shortlist and ask one focused follow-up question before giving final instructions."
