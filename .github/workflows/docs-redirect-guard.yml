name: Docs Redirect Guard

on:
  pull_request:
    paths:
      - 'data/docs/**'
      - 'next.config.js'
      - 'scripts/check-doc-redirects.js'
      - 'tests/doc-redirects.test.js'
      - 'tests/fixtures/**'
      - 'package.json'
      - '.github/workflows/docs-redirect-guard.yml'

jobs:
  check-redirects:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reminder if PR touches components MDX partials
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set +e
          touched="$(git diff --name-only "$BASE_SHA" HEAD | grep -E '^components/.*\.mdx$' || true)"
          set -e
          if [ -n "$touched" ]; then
            echo "::notice title=Shared doc components::This PR changes MDX under components/. Prefer React (.tsx) for new shared fragments (wiring in MDXComponents and agent-markdown stubs is simpler). Reviewers: flag newly added .mdx partials here unless there is a strong reason to keep them."
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install --frozen-lockfile --non-interactive

      - name: Run doc redirect tests
        run: yarn test:doc-redirects

      - name: Validate docs redirects
        run: yarn check:doc-redirects
