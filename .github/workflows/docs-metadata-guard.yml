name: Docs Metadata Guard

on:
  pull_request:
    paths:
      - "data/docs/**"
      - "next.config.js"
      - "scripts/check-docs-metadata.js"
      - "tests/docs-metadata.test.js"
      - "tests/fixtures/**"
      - "package.json"
      - ".github/workflows/docs-metadata-guard.yml"

jobs:
  check-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Reminder if PR touches components MDX partials
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set +e
          touched="$(git diff --name-only "$BASE_SHA" HEAD | grep -E '^components/.*\.mdx$' || true)"
          set -e
          if [ -n "$touched" ]; then
            echo "::notice title=Shared doc components::This PR changes MDX under components/. Prefer React (.tsx) for new shared fragments (wiring in MDXComponents and agent-markdown stubs is simpler). Reviewers: flag newly added .mdx partials here unless there is a strong reason to keep them."
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: yarn install --frozen-lockfile --non-interactive

      - name: Run docs metadata tests
        run: yarn test:docs-metadata

      - name: Validate docs metadata
        run: yarn check:docs-metadata
